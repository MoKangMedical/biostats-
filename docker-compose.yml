version: "3.8"

services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite:///./data/biostats.db
      - SECRET_KEY=${SECRET_KEY:-dev-secret-key}
      - ENVIRONMENT=production
    volumes:
      - ./data:/app/data
      - ./backend/uploads:/app/backend/uploads
    restart: unless-stopped

