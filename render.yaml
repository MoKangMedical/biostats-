services:
  - type: web
    name: biostats
    runtime: python
    region: oregon
    plan: starter
    buildCommand: pip install fastapi uvicorn scipy numpy matplotlib pydantic
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
    healthCheckPath: /health
    autoDeploy: true
